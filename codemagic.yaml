workflows:
  ios-release:
    name: iOS Release
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Codemagic_AstroDots
    environment:
      vars:
        BUNDLE_ID: com.inknmotion.app
        XCODE_WORKSPACE: ios/Runner.xcworkspace
        XCODE_SCHEME: Runner
      flutter: stable
      xcode: latest
    scripts:
      - name: Inject GoogleService-Info.plist
        script: |
          echo $IOS_FIREBASE_CONFIG | base64 --decode > $CM_BUILD_DIR/ios/Runner/GoogleService-Info.plist
      - name: Inject config/app.env
        script: |
          mkdir -p $CM_BUILD_DIR/config
          if [ -n "$APP_ENV_CONFIG" ]; then
            echo "$APP_ENV_CONFIG" | base64 --decode > $CM_BUILD_DIR/config/app.env
          else
            cat <<EOF > $CM_BUILD_DIR/config/app.env
          REVENUECAT_ANDROID_API_KEY=${REVENUECAT_ANDROID_API_KEY}
          REVENUECAT_IOS_API_KEY=${REVENUECAT_IOS_API_KEY}
          RENDER_API_URL=${RENDER_API_URL:-https://ink-n-motion-api.onrender.com}
          EOF
          fi
          if ! grep -qE '^REVENUECAT_IOS_API_KEY=.+$' "$CM_BUILD_DIR/config/app.env"; then
            echo "ERROR: REVENUECAT_IOS_API_KEY missing in config/app.env"
            echo "Set APP_ENV_CONFIG (base64 of config/app.env) or REVENUECAT_IOS_API_KEY in Codemagic."
            exit 1
          fi
      - name: Get Flutter packages
        script: flutter packages pub get
      - name: Flutter analyze
        script: flutter analyze
      - name: Set up code signing
        script: |
          keychain initialize
          app-store-connect create-certificate --type IOS_DISTRIBUTION --save || true
          app-store-connect fetch-signing-files "com.inknmotion.app" --type IOS_APP_STORE --create
          keychain add-certificates
          xcode-project use-profiles

      - name: Build iOS IPA
        script: |
          flutter build ipa --release --dart-define-from-file=config/app.env
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true

  android-release:
    name: Android Release
    max_build_duration: 60
    instance_type: linux_x2
    environment:
      vars:
        PACKAGE_NAME: com.inknmotion.ink_n_motion
      flutter: stable
      java: 17
    scripts:
      - name: Inject google-services.json
        script: |
          echo $ANDROID_FIREBASE_CONFIG | base64 --decode > $CM_BUILD_DIR/android/app/google-services.json
      - name: Inject config/app.env
        script: |
          mkdir -p $CM_BUILD_DIR/config
          if [ -n "$APP_ENV_CONFIG" ]; then
            echo "$APP_ENV_CONFIG" | base64 --decode > $CM_BUILD_DIR/config/app.env
          else
            cat <<EOF > $CM_BUILD_DIR/config/app.env
          REVENUECAT_ANDROID_API_KEY=${REVENUECAT_ANDROID_API_KEY}
          REVENUECAT_IOS_API_KEY=${REVENUECAT_IOS_API_KEY}
          RENDER_API_URL=${RENDER_API_URL:-https://ink-n-motion-api.onrender.com}
          EOF
          fi
          if ! grep -qE '^REVENUECAT_ANDROID_API_KEY=.+$' "$CM_BUILD_DIR/config/app.env"; then
            echo "ERROR: REVENUECAT_ANDROID_API_KEY missing in config/app.env"
            echo "Set APP_ENV_CONFIG (base64 of config/app.env) or REVENUECAT_ANDROID_API_KEY in Codemagic."
            exit 1
          fi
      - name: Set up Android keystore
        script: |
          echo $ANDROID_KEYSTORE | base64 --decode > $CM_BUILD_DIR/android/app/upload-keystore.jks
          cat <<EOF > $CM_BUILD_DIR/android/key.properties
          storePassword=$ANDROID_KEYSTORE_PASSWORD
          keyPassword=$ANDROID_KEYSTORE_PASSWORD
          keyAlias=$ANDROID_KEY_ALIAS
          storeFile=app/upload-keystore.jks
          EOF
      - name: Get Flutter packages
        script: flutter packages pub get
      - name: Flutter analyze
        script: flutter analyze
      - name: Build Android App Bundle
        script: |
          flutter build appbundle --release --dart-define-from-file=config/app.env
    artifacts:
      - build/app/outputs/bundle/release/*.aab
