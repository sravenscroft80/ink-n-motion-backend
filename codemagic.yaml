workflows:
  ios-release:
    name: iOS Release
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Codemagic_AstroDots
    environment:
      groups:
        - app_env
      vars:
        BUNDLE_ID: com.inknmotion.app
        XCODE_WORKSPACE: ios/Runner.xcworkspace
        XCODE_SCHEME: Runner
      flutter: stable
      xcode: latest
    scripts:
      - name: Inject GoogleService-Info.plist
        script: |
          echo $IOS_FIREBASE_CONFIG | base64 --decode > $CM_BUILD_DIR/ios/Runner/GoogleService-Info.plist
      - name: Inject config/app.env
        script: |
          mkdir -p $CM_BUILD_DIR/config
          if [ -n "$APP_ENV_CONFIG" ]; then
            echo "$APP_ENV_CONFIG" | base64 --decode > $CM_BUILD_DIR/config/app.env
          else
            cat <<EOF > $CM_BUILD_DIR/config/app.env
          REVENUECAT_ANDROID_API_KEY=${REVENUECAT_ANDROID_API_KEY}
          REVENUECAT_IOS_API_KEY=${REVENUECAT_IOS_API_KEY}
          RENDER_API_URL=${RENDER_API_URL:-https://ink-n-motion-api.onrender.com}
          EOF
          fi
          if ! grep -qE '^REVENUECAT_IOS_API_KEY=.+$' "$CM_BUILD_DIR/config/app.env"; then
            echo "ERROR: REVENUECAT_IOS_API_KEY missing in config/app.env"
            echo "Set APP_ENV_CONFIG (base64 of config/app.env) or REVENUECAT_IOS_API_KEY in Codemagic."
            exit 1
          fi
      - name: Get Flutter packages
        script: flutter packages pub get
      - name: Flutter analyze
        script: flutter analyze --no-fatal-infos --no-fatal-warnings
      - name: Set up code signing
        script: |
          keychain initialize
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --platform IOS \
            --type IOS_APP_STORE \
            --certificate-key=@env:CM_CERTIFICATE \
            --create \
            --delete-stale-profiles \
            --strict-match-identifier || \
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --platform IOS \
            --type IOS_APP_STORE \
            --create \
            --strict-match-identifier
          keychain add-certificates
          xcode-project use-profiles
          echo "=== Installed provisioning profiles ==="
          ls -la "$HOME/Library/MobileDevice/Provisioning Profiles/" || echo "NONE FOUND"
          /usr/libexec/PlistBuddy -c 'Print' ios/Runner/Runner.entitlements

      - name: Build iOS IPA
        script: |
          xcode-project use-profiles
          sed -i '' 's/CODE_SIGN_STYLE = Automatic/CODE_SIGN_STYLE = Manual/g' ios/Runner.xcodeproj/project.pbxproj
          flutter build ipa --release \
            --dart-define-from-file=config/app.env \
            --export-options-plist=/Users/builder/export_options.plist

      - name: Verify signed entitlements (SIWA)
        script: |
          IPA=$(find "$CM_BUILD_DIR/build/ios/ipa" -name '*.ipa' | head -1)
          if [ -z "$IPA" ]; then
            echo "ERROR: No IPA artifact found"
            exit 1
          fi
          rm -rf /tmp/ipa_entitlements_check
          mkdir -p /tmp/ipa_entitlements_check
          unzip -q -o "$IPA" -d /tmp/ipa_entitlements_check
          APP="/tmp/ipa_entitlements_check/Payload/Runner.app"
          codesign -d --entitlements :- "$APP" > /tmp/Runner.entitlements.xml
          echo "=== Signed Runner.app entitlements ==="
          cat /tmp/Runner.entitlements.xml
          if ! grep -q 'com.apple.developer.applesignin' /tmp/Runner.entitlements.xml; then
            echo "ERROR: Signed IPA missing com.apple.developer.applesignin — provisioning profile likely stale."
            echo "Confirm App ID has Sign in with Apple enabled, then re-run this workflow."
            exit 1
          fi
          echo "OK: Sign in with Apple entitlement present in signed IPA"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true

  android-release:
    name: Android Release
    max_build_duration: 60
    instance_type: linux_x2
    environment:
      groups:
        - app_env
      vars:
        PACKAGE_NAME: com.inknmotion.ink_n_motion
      flutter: stable
      java: 17
    scripts:
      - name: Inject google-services.json
        script: |
          echo $ANDROID_FIREBASE_CONFIG | base64 --decode > $CM_BUILD_DIR/android/app/google-services.json
      - name: Inject config/app.env
        script: |
          mkdir -p $CM_BUILD_DIR/config
          if [ -n "$APP_ENV_CONFIG" ]; then
            echo "$APP_ENV_CONFIG" | base64 --decode > $CM_BUILD_DIR/config/app.env
          else
            cat <<EOF > $CM_BUILD_DIR/config/app.env
          REVENUECAT_ANDROID_API_KEY=${REVENUECAT_ANDROID_API_KEY}
          REVENUECAT_IOS_API_KEY=${REVENUECAT_IOS_API_KEY}
          RENDER_API_URL=${RENDER_API_URL:-https://ink-n-motion-api.onrender.com}
          EOF
          fi
          if ! grep -qE '^REVENUECAT_ANDROID_API_KEY=.+$' "$CM_BUILD_DIR/config/app.env"; then
            echo "ERROR: REVENUECAT_ANDROID_API_KEY missing in config/app.env"
            echo "Set APP_ENV_CONFIG (base64 of config/app.env) or REVENUECAT_ANDROID_API_KEY in Codemagic."
            exit 1
          fi
      - name: Set up Android keystore
        script: |
          echo $ANDROID_KEYSTORE | base64 --decode > $CM_BUILD_DIR/android/app/upload-keystore.jks
          cat <<EOF > $CM_BUILD_DIR/android/key.properties
          storePassword=$ANDROID_KEYSTORE_PASSWORD
          keyPassword=$ANDROID_KEYSTORE_PASSWORD
          keyAlias=$ANDROID_KEY_ALIAS
          storeFile=app/upload-keystore.jks
          EOF
      - name: Get Flutter packages
        script: flutter packages pub get
      - name: Flutter analyze
        script: flutter analyze --no-fatal-infos --no-fatal-warnings
      - name: Build Android App Bundle
        script: |
          flutter build appbundle --release --dart-define-from-file=config/app.env
    artifacts:
      - build/app/outputs/bundle/release/*.aab
